<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Query Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <i class="fas fa-robot robot-icon"></i>
                <h2>College Assistant</h2>
            </div>
            <div class="header-actions">
                <button id="clear-btn" class="clear-btn" title="Clear Chat">
                    <i class="fas fa-trash"></i>
                </button>
                <button id="exit-btn" class="clear-btn" title="Exit Chat" style="margin-left: 15px;">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <!-- Initial Greeting Message -->
            <div class="message bot-message">
                <div class="message-content">
                    Hello! Welcome to the college inquiry bot. How can I help you today? Try asking about courses, fees,
                    or timings.
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
            <button id="send-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
